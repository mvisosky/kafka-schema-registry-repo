name: Scaffold New Schema Module

on:
    workflow_dispatch:
        inputs:
            module_name:
                description: "Module Name (MUST end in -schemas)"
                required: true
                type: string
            module_desc:
                description: "Short description for the Maven POM"
                required: true
                type: string

jobs:
    scaffold:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6

            - name: Validate Input & Create Branch
              id: setup
              run: |
                  MODULE_NAME="${{ inputs.module_name }}"

                  # 1. Enforce the suffix convention
                  if [[ "$MODULE_NAME" != *-schemas ]]; then
                      echo "::error::Module name must end with '-schemas' (e.g., payment-schemas)."
                      exit 1
                  fi

                  # 2. Extract the prefix and enforce NO internal hyphens
                  PREFIX="${MODULE_NAME%-schemas}"
                  if [[ "$PREFIX" == *-* ]]; then
                      echo "::error::The module prefix '$PREFIX' cannot contain hyphens. This ensures a valid Java package name. Use 'flightops' instead of 'flight-ops'."
                      exit 1
                  fi

                  # 3. Prevent Duplicates
                  if [ -d "$MODULE_NAME" ]; then
                      echo "::error::Directory $MODULE_NAME already exists!"
                      exit 1
                  fi

                  # 4. Create a unique branch name
                  BRANCH_NAME="scaffold/${MODULE_NAME}-$(date +%s)"
                  echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
                  git checkout -b "$BRANCH_NAME"

            - name: Scaffold Directory & Child POM
              run: |
                  MODULE_NAME="${{ inputs.module_name }}"
                  MODULE_DESC="${{ inputs.module_desc }}"

                  # Strip the "-schemas" suffix to create a valid Java package name
                  # e.g., "flightops-schemas" becomes "flightops"
                  PACKAGE_NAME="${MODULE_NAME%-schemas}"

                  # 1. Unconditionally create BOTH directories
                  mkdir -p "$MODULE_NAME/src/main/avro"
                  echo "// Place your .avsc files here" > "$MODULE_NAME/src/main/avro/.keep"

                  mkdir -p "$MODULE_NAME/src/main/json"
                  echo "// Place your .json files here" > "$MODULE_NAME/src/main/json/.keep"

                  # 2. Generate the POM
                  cat <<EOF > "$MODULE_NAME/pom.xml"
                  <?xml version="1.0" encoding="UTF-8"?>
                  <project xmlns="http://maven.apache.org/POM/4.0.0"
                           xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                           xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd">
                      <modelVersion>4.0.0</modelVersion>

                      <parent>
                          <groupId>com.yourcompany.schemas</groupId>
                          <artifactId>schema-parent</artifactId>
                          <version>\${revision}</version>
                          <relativePath>../pom.xml</relativePath>
                      </parent>

                      <artifactId>$MODULE_NAME</artifactId>
                      <description>$MODULE_DESC</description>

                      <properties>
                          <maven.deploy.skip>false</maven.deploy.skip>
                          <schema.packageName>$PACKAGE_NAME</schema.packageName>
                      </properties>

                      <build>
                          <plugins>
                            <plugin>
                                <groupId>org.apache.avro</groupId>
                                <artifactId>avro-maven-plugin</artifactId>
                            </plugin>
                            <plugin>
                                <groupId>org.jsonschema2pojo</groupId>
                                <artifactId>jsonschema2pojo-maven-plugin</artifactId>
                            </plugin>
                          </plugins>
                      </build>
                  </project>
                  EOF

            - name: Update Parent POM
              run: |
                  sed -i "s|</modules>|    <module>${{ inputs.module_name }}</module>\n    </modules>|g" pom.xml

            - name: Commit & Push Branch
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add .
                  git commit -m "build: scaffold new ${{ inputs.schema_format }} module ${{ inputs.module_name }}"
                  git push -u origin "${{ steps.setup.outputs.branch_name }}"

            - name: Create Pull Request
              id: create_pr
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  PR_URL=$(gh pr create \
                    --title "build: scaffold ${{ inputs.module_name }}" \
                    --body "This PR scaffolds the directory structure and child \`pom.xml\` for the new **${{ inputs.module_name }}** domain, configured for **${{ inputs.schema_format }}**." \
                    --base main \
                    --head "${{ steps.setup.outputs.branch_name }}" \
                    --draft)
                  echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

            - name: Publish Run Summary
              run: |
                  echo "### 🎉 Module Scaffolded Successfully!" >> $GITHUB_STEP_SUMMARY
                  echo "The baseline directory structure and Maven configuration for **\`${{ inputs.module_name }}\`** have been generated." >> $GITHUB_STEP_SUMMARY
                  echo "#### 🔗 [Click here to view your Pull Request](${{ steps.create_pr.outputs.pr_url }})" >> $GITHUB_STEP_SUMMARY
