name: Semantic Multi-Module Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  # ==========================================
  # JOB 1: THE SCOUT (Detects Changes)
  # ==========================================
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Expose these variables to the next job
    outputs:
      any_changed: ${{ steps.changed.outputs.any_changed }}
      maven_list: ${{ steps.changed.outputs.maven_list }}
      bash_array: ${{ steps.changed.outputs.bash_array }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get Changed Modules
        id: changed
        run: |
          # --- 1. DETERMINE GIT RANGE TO COMPARE ---
          # We need the starting SHA (BASE) and ending SHA (HEAD) to see what changed.
          # PRs use the base branch and head branch. Pushes to main use the previous commit.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA=${{ github.event.pull_request.base.sha }}
            HEAD_SHA=${{ github.event.pull_request.head.sha }}
          else
            BASE_SHA=${{ github.event.before }}
            HEAD_SHA=${{ github.sha }}
            
            # THE EMPTY TREE HASH: If this is the very first commit to the repo, there is no 'previous' commit.
            # We use Git's hardcoded empty tree hash (4b825dc...) to safely diff against nothing.
            if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              BASE_SHA="4b825dc642cb6eb9a060e54bf8d69288fbee4904"
            fi
          fi

          # --- 2. EXTRACT ROOT ITEMS ---
          # Get all changed files, keep only the top-level directory name (cut -f1), and remove duplicates (sort -u).
          CHANGED_FILES=$(git diff --name-only $BASE_SHA $HEAD_SHA)
          ALL_ROOT_ITEMS=$(echo "$CHANGED_FILES" | cut -d'/' -f1 | sort -u)

          MOD_ARRAY=""

          # --- 3. DUCK TYPING (STRUCTURAL DISCOVERY) ---
          # Iterate through every changed root item. If it is a directory AND contains a pom.xml,
          # we treat it as a valid Maven module that needs building (ignoring READMEs, workflows, etc.).
          for ITEM in $ALL_ROOT_ITEMS; do
            if [[ -d "$ITEM" && -f "$ITEM/pom.xml" ]]; then
              MOD_ARRAY="$MOD_ARRAY $ITEM"
            fi
          done

          # Clean up leading/trailing spaces
          MOD_ARRAY=$(echo $MOD_ARRAY | xargs)

          # --- 4. FORMAT OUTPUTS ---
          # Maven requires comma-separated lists (-pl a,b). Bash loops prefer space-separated (a b).
          if [[ -z "$MOD_ARRAY" ]]; then
            echo "any_changed=false" >> $GITHUB_OUTPUT
            echo "No schema modules were changed. Stopping here."
          else
            echo "any_changed=true" >> $GITHUB_OUTPUT
            echo "maven_list=$(echo "$MOD_ARRAY" | tr ' ' ',')" >> $GITHUB_OUTPUT
            echo "bash_array=$MOD_ARRAY" >> $GITHUB_OUTPUT
            echo "Detected schema modules: $MOD_ARRAY"
          fi

  # ==========================================
  # JOB 2: THE BUILDER (Compiles & Deploys)
  # ==========================================
  deploy:
    runs-on: ubuntu-latest
    # Wait for detect job to finish
    needs: detect
    # Only run if detect job found changed modules
    if: needs.detect.outputs.any_changed == 'true'
    permissions:
      contents: write
      packages: write

    steps:
      # We must checkout again because this job runs on a fresh runner environment
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: "11"
          distribution: "temurin"
          server-id: github

      - name: Calculate Version
        id: semver
        run: |
          # --- 1. PR VERSIONING (EPHEMERAL) ---
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # For Pull Requests, we don't deploy to the registry. We just package the JAR to validate it.
            # We assign a dummy version based on the commit hash (e.g., 0.0.0-a1b2c3d) for local tracking.
            SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
            echo "REV=0.0.0-$SHORT_SHA" >> $GITHUB_OUTPUT
            echo "GOAL=package" >> $GITHUB_OUTPUT
          else
          # --- 2. MAIN BRANCH SEMVER (PRODUCTION) ---
            # Find the latest git tag (e.g., v1.2.0). If none exists, default to 1.0.0.
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
            BASE_VER=${LATEST_TAG#v}
            
            # Split version into Major, Minor, Patch variables
            IFS='.' read -r -a PARTS <<< "$BASE_VER"
            MAJOR=${PARTS[0]}; MINOR=${PARTS[1]}; PATCH=${PARTS[2]}
            
            FULL_MSG=$(git log -1 --pretty=%B)
            SUBJECT=$(echo "$FULL_MSG" | head -n 1)

            # Parse the commit message for Conventional Commits prefixes to determine the version bump.
            if [[ "$SUBJECT" =~ .*\!:.* ]] || [[ "$FULL_MSG" == *"BREAKING CHANGE"* ]]; then
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            elif [[ "$SUBJECT" == "feat:"* ]]; then
              MINOR=$((MINOR + 1)); PATCH=0
            elif [[ "$SUBJECT" == "fix:"* ]]; then
              PATCH=$((PATCH + 1))
            else
              PATCH=$((PATCH + 1)) # Default fallback
            fi

            echo "REV=$MAJOR.$MINOR.$PATCH" >> $GITHUB_OUTPUT
            echo "GOAL=deploy" >> $GITHUB_OUTPUT
          fi

      - name: Maven Action
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Execute Maven with the dynamically chosen goal (package for PRs, deploy for main).
          # We inject the calculated version using -Drevision.
          # The -pl flag tells Maven to ONLY build the modules that actually changed.
          # The -am flag ensures Maven also builds the parent POM if required.
          mvn clean ${{ steps.semver.outputs.GOAL }} "-Drevision=${{ steps.semver.outputs.REV }}" -pl ${{ needs.detect.outputs.maven_list }} -am

      - name: Update Changelogs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VER="${{ steps.semver.outputs.REV }}"
          DATE=$(date +%Y-%m-%d)

          # 1. Fetch PR Data via GitHub CLI
          PR_DATA=$(gh api /repos/${{ github.repository }}/commits/${{ github.sha }}/pulls || echo "[]")
          PR_TITLE=$(echo "$PR_DATA" | jq -r '.[0].title // empty')
          PR_BODY=$(echo "$PR_DATA" | jq -r '.[0].body // empty')

          if [ -z "$PR_TITLE" ]; then
            PR_TITLE=$(git log -1 --pretty=format:%s)
            PR_BODY=$(git log -1 --pretty=format:%b)
          fi

          # 2. Loop through the changed modules
          for MOD in ${{ needs.detect.outputs.bash_array }}; do
            if [ -d "$MOD" ]; then
              touch "$MOD/CHANGELOG.md"
              
              # --- NEW: Extract the exact Group ID from the module's POM ---
              # We use mvn help:evaluate to safely resolve the groupId, even if inherited from a parent
              GROUP_ID=$(mvn help:evaluate -Dexpression=project.groupId -q -DforceStdout -f "$MOD/pom.xml")
              
              # 3. Inject the PR data AND the Maven coordinates using a Heredoc
              cat <<EOF > temp_entry.md
          ## [$NEW_VER] - $DATE

          **$PR_TITLE**

          $PR_BODY

          ### 📦 Maven Coordinates
          Add the following dependency to your \`pom.xml\` to consume this version from GitHub Packages:

          \`\`\`xml
          <dependency>
              <groupId>$GROUP_ID</groupId>
              <artifactId>$MOD</artifactId>
              <version>$NEW_VER</version>
          </dependency>
          \`\`\`

          EOF
              
              cat "$MOD/CHANGELOG.md" >> temp_entry.md 2>/dev/null || true
              mv temp_entry.md "$MOD/CHANGELOG.md"
              
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add "$MOD/CHANGELOG.md"
            fi
          done

          git commit -m "docs: update changelogs for $NEW_VER [skip ci]" || echo "No changes"
          git push origin main

      - name: Create Git Tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Create a lightweight Git tag (e.g., v1.2.0) to mark this release point in the history.
          # We push this directly to the repository instead of creating a full GitHub Release UI page.
          NEW_VER="${{ steps.semver.outputs.REV }}"
          git tag "v$NEW_VER"
          git push origin "v$NEW_VER"

      - name: Publish Run Summary
        if: always()
        run: |
          echo "### 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.semver.outputs.REV }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Event:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 📦 Modules Updated:" >> $GITHUB_STEP_SUMMARY

          # Loop through the array and print each module as a bullet point
          for MOD in ${{ needs.detect.outputs.bash_array }}; do
            echo "- \`$MOD\`" >> $GITHUB_STEP_SUMMARY
          done
