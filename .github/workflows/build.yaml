name: Semantic Multi-Module Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Required for git tags and history

      - name: Set up JDK 25
        uses: actions/setup-java@v6
        with:
          java-version: "25"
          distribution: "temurin"
          server-id: github # Matches <id> in Parent POM distributionManagement

      # 1. Native Git Diff (Structural Discovery)
      - name: Get Changed Modules
        id: changed
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # For PRs: Compare against the target branch
            BASE_SHA=${{ github.event.pull_request.base.sha }}
            HEAD_SHA=${{ github.event.pull_request.head.sha }}
          else
            # For Pushes: Compare against the previous commit
            BASE_SHA=${{ github.event.before }}
            HEAD_SHA=${{ github.sha }}
            
            # Fallback for the very first commit (Git's hardcoded empty tree hash)
            if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              BASE_SHA="4b825dc642cb6eb9a060e54bf8d69288fbee4904"
            fi
          fi

          # Output all changed files
          CHANGED_FILES=$(git diff --name-only $BASE_SHA $HEAD_SHA)

          # Extract all unique root-level items that changed
          ALL_ROOT_ITEMS=$(echo "$CHANGED_FILES" | cut -d'/' -f1 | sort -u)

          MOD_ARRAY=""

          # Iterate and check for structural validity (Is it a Maven module?)
          for ITEM in $ALL_ROOT_ITEMS; do
            if [[ -d "$ITEM" && -f "$ITEM/pom.xml" ]]; then
              MOD_ARRAY="$MOD_ARRAY $ITEM"
            fi
          done

          # Clean up leading/trailing spaces
          MOD_ARRAY=$(echo $MOD_ARRAY | xargs)

          # Export variables for downstream steps
          if [[ -z "$MOD_ARRAY" ]]; then
            echo "any_changed=false" >> $GITHUB_OUTPUT
            echo "No schema modules were changed."
          else
            echo "any_changed=true" >> $GITHUB_OUTPUT
            
            # Format for Maven (-pl flightops-schemas,hcm-schemas)
            MOD_LIST=$(echo "$MOD_ARRAY" | tr ' ' ',')
            
            echo "maven_list=$MOD_LIST" >> $GITHUB_OUTPUT
            echo "bash_array=$MOD_ARRAY" >> $GITHUB_OUTPUT
            
            echo "Detected schema modules: $MOD_ARRAY"
          fi

      # 2. Calculate Semantic Version based on Conventional Commits
      - name: Calculate Version
        id: semver
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # PRs get a unique hash-based version for tracking
            SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
            echo "REV=0.0.0-$SHORT_SHA" >> $GITHUB_OUTPUT
            echo "GOAL=package" >> $GITHUB_OUTPUT
          else
            # Main branch: calculate bump from latest Git Tag
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
            BASE_VER=${LATEST_TAG#v}
            
            IFS='.' read -r -a PARTS <<< "$BASE_VER"
            MAJOR=${PARTS[0]}; MINOR=${PARTS[1]}; PATCH=${PARTS[2]}

            FULL_MSG=$(git log -1 --pretty=%B)
            SUBJECT=$(echo "$FULL_MSG" | head -n 1)

            # Conventional Commit Logic
            if [[ "$SUBJECT" =~ .*\!:.* ]] || [[ "$FULL_MSG" == *"BREAKING CHANGE"* ]]; then
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            elif [[ "$SUBJECT" == "feat:"* ]]; then
              MINOR=$((MINOR + 1)); PATCH=0
            elif [[ "$SUBJECT" == "fix:"* ]]; then
              PATCH=$((PATCH + 1))
            else
              PATCH=$((PATCH + 1)) # Default fallback
            fi

            echo "REV=$MAJOR.$MINOR.$PATCH" >> $GITHUB_OUTPUT
            echo "GOAL=deploy" >> $GITHUB_OUTPUT
          fi

      # 3. Maven Execute (Clean, Validate, Test, Deploy)
      - name: Maven Action
        if: steps.changed.outputs.any_changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Building modules: ${{ steps.changed.outputs.maven_list }}"
          mvn clean ${{ steps.semver.outputs.GOAL }} "-Drevision=${{ steps.semver.outputs.REV }}" -pl ${{ steps.changed.outputs.maven_list }} -am

      # 4. Update Per-Module Changelogs (Main Only)
      - name: Update Changelogs
        if: steps.changed.outputs.any_changed == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          NEW_VER="${{ steps.semver.outputs.REV }}"
          DATE=$(date +%Y-%m-%d)
          MSG=$(git log -1 --pretty=%B)

          for MOD in ${{ steps.changed.outputs.bash_array }}; do
            if [ -d "$MOD" ]; then
              touch "$MOD/CHANGELOG.md"
              TEMP_LOG="## [$NEW_VER] - $DATE\n\n$MSG\n\n$(cat $MOD/CHANGELOG.md 2>/dev/null)"
              echo -e "$TEMP_LOG" > "$MOD/CHANGELOG.md"
              
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add "$MOD/CHANGELOG.md"
            fi
          done

          git commit -m "docs: update changelogs for $NEW_VER [skip ci]" || echo "No changes"
          git push origin main

      # 5. Create Git Tag (No GitHub Release)
      - name: Create Git Tag
        if: steps.changed.outputs.any_changed == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          NEW_VER="${{ steps.semver.outputs.REV }}"

          echo "Tagging repository with v$NEW_VER"
          git tag "v$NEW_VER"
          git push origin "v$NEW_VER"
