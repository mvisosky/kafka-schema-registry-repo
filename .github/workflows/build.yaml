name: Semantic Multi-Module Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for git tags and history

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          server-id: github # Matches <id> in Parent POM distributionManagement

      # 1. Detect which module folders changed
      - name: Get Changed Modules
        id: changed
        uses: tj-actions/changed-files@v42
        with:
          dir_names: true
          dir_names_max_depth: 1
          files: |
            flightops/**
            notification/**

      # 2. Calculate Semantic Version based on Conventional Commits
      - name: Calculate Version
        id: semver
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # PRs get a unique hash-based version for tracking
            SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
            echo "REV=0.0.0-$SHORT_SHA" >> $GITHUB_OUTPUT
            echo "GOAL=package" >> $GITHUB_OUTPUT
          else
            # Main branch: calculate bump from latest Git Tag
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
            BASE_VER=${LATEST_TAG#v}
            
            IFS='.' read -r -a PARTS <<< "$BASE_VER"
            MAJOR=${PARTS[0]}; MINOR=${PARTS[1]}; PATCH=${PARTS[2]}

            FULL_MSG=$(git log -1 --pretty=%B)
            SUBJECT=$(echo "$FULL_MSG" | head -n 1)

            # Conventional Commit Logic
            if [[ "$SUBJECT" =~ .*\!:.* ]] || [[ "$FULL_MSG" == *"BREAKING CHANGE"* ]]; then
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            elif [[ "$SUBJECT" == "feat:"* ]]; then
              MINOR=$((MINOR + 1)); PATCH=0
            elif [[ "$SUBJECT" == "fix:"* ]]; then
              PATCH=$((PATCH + 1))
            else
              PATCH=$((PATCH + 1)) # Default fallback
            fi

            echo "REV=$MAJOR.$MINOR.$PATCH" >> $GITHUB_OUTPUT
            echo "GOAL=deploy" >> $GITHUB_OUTPUT
          fi

      # 3. Maven Execute (Clean, Validate, Test, Deploy)
      - name: Maven Action
        if: steps.changed.outputs.any_changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MOD_LIST=$(echo "${{ steps.changed.outputs.all_changed_files }}" | tr ' ' ',')
          # Using quotes for revision ensures dots are handled correctly by the shell
          mvn clean ${{ steps.semver.outputs.GOAL }} "-Drevision=${{ steps.semver.outputs.REV }}" -pl $MOD_LIST -am

      # 4. Update Per-Module Changelogs (Main Only)
      - name: Update Changelogs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          MOD_LIST="${{ steps.changed.outputs.all_changed_files }}"
          NEW_VER="${{ steps.semver.outputs.REV }}"
          DATE=$(date +%Y-%m-%d)
          MSG=$(git log -1 --pretty=%B)

          for MOD in $MOD_LIST; do
            if [ -d "$MOD" ]; then
              touch "$MOD/CHANGELOG.md"
              TEMP_LOG="## [$NEW_VER] - $DATE\n\n$MSG\n\n$(cat $MOD/CHANGELOG.md 2>/dev/null)"
              echo -e "$TEMP_LOG" > "$MOD/CHANGELOG.md"
              
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add "$MOD/CHANGELOG.md"
            fi
          done

          git commit -m "docs: update changelogs for $NEW_VER [skip ci]" || echo "No changes"
          git push origin main

      # 5. Create Tag and GitHub Release (Main Only)
      - name: Finalize Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.semver.outputs.REV }}
          name: Release v${{ steps.semver.outputs.REV }}
          generate_release_notes: true # <-- This does the heavy lifting beautifully
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
